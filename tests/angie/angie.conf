# Include extra snippets if you have them
include /etc/angie/conf.d/custom/*.conf;

server {
    listen 80;

    # Shared headers for all locations
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    add_header X-Upstream-Server $upstream_addr;

    location /linear {
        proxy_pass http://linear_app_upstream/;
    }

    location /canary {
        proxy_pass http://canary_app_upstream/;
    }

    location /bluegreen {
        proxy_pass http://blue_green_app_upstream/;
    }
}
