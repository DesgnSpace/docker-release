services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["watch"]

  worker:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=worker-v1
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=none"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=2s"
