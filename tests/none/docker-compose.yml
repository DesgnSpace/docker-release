services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["watch"]
    environment:
      - DR_EXPOSE_API=true
      - DR_EXPOSE_WEB=true
    ports:
      - "9080:9080"
      - "9081:9081"

  worker:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=worker-v1
    labels:
      - "release.enable=true"
      - "release.provider=none"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=2s"
