# Include extra snippets if you have them
include /etc/nginx/conf.d/custom/*.conf;

server {
    listen 80;

    server_tokens off;

    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Shared headers for all locations
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # Custom headers
    add_header X-Server-ID $hostname;
    add_header X-Request-ID $request_id;

    location /linear/ {
        proxy_pass http://linear_app_upstream/;
    }

    location /canary/ {
        proxy_pass http://canary_app_upstream/;
    }

    location /bluegreen/ {
        proxy_pass http://blue_green_app_upstream/;
    }
}
