worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/conf.d/custom/*.conf;

    server {
        listen 80;

        location /linear/ {
            proxy_pass http://linear_app_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /canary/ {
            proxy_pass http://canary_app_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /bluegreen/ {
            proxy_pass http://blue_green_app_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
