services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-config:/shared/nginx-config:rw
    command: ["watch"]
    depends_on:
      app:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - nginx-config:/etc/nginx/conf.d/custom:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      docker-release:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: ${BUILD_ID:-default}
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=nginx"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=1m"
      - "release.health_check_timeout=60s"
      - "release.nginx.container=nginx"
      - "release.nginx.config_dir=/shared/nginx-config"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  nginx-config:
