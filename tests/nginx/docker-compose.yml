services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-config:/shared/nginx-config:rw
    command: ["watch"]
    depends_on:
      linear_app:
        condition: service_started
      canary_app:
        condition: service_started
      blue_green_app:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - nginx-config:/etc/nginx/conf.d/custom:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      docker-release:
        condition: service_started

  linear_app:
    build:
      context: .
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "linear"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "release.enable=true"
      - "release.provider=nginx"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"
      - "release.nginx.container=nginx"
      - "release.nginx.config_dir=/shared/nginx-config"

  canary_app:
    build:
      context: .
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "canary"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "release.enable=true"
      - "release.provider=nginx"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.health_check_timeout=20s"
      - "release.nginx.container=nginx"
      - "release.nginx.config_dir=/shared/nginx-config"

  blue_green_app:
    build:
      context: .
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "blue_green"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "release.enable=true"
      - "release.provider=nginx"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.health_check_timeout=20s"
      - "release.nginx.container=nginx"
      - "release.nginx.config_dir=/shared/nginx-config"

volumes:
  nginx-config:
