services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-config:/etc/nginx/conf.d/custom:rw
    environment:
      - RELEASE_STATE_DIR=/var/lib/docker-release
      - RELEASE_CONFIG_DIR=/etc/nginx/conf.d/custom
    command: ["watch"]

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - nginx-config:/etc/nginx/conf.d/custom:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  app:
    image: nginx:alpine
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=nginx"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=1m"
      - "release.health_check_timeout=30s"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  nginx-config:
