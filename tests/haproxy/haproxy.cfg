global
    master-worker
    log stdout format raw local0
    stats socket /tmp/haproxy.sock mode 660 level admin expose-fd listeners

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option http-keep-alive
    log global

frontend http
    bind *:80

    http-request redirect location /linear/ code 301 if { path / }

    acl is_linear    path_beg /linear
    acl is_canary    path_beg /canary
    acl is_bluegreen path_beg /bluegreen

    http-request set-var(txn.be) str(linear)    if is_linear
    http-request set-var(txn.be) str(canary)    if is_canary
    http-request set-var(txn.be) str(bluegreen) if is_bluegreen

    http-request set-path %[path,regsub(^/linear,/)]    if { var(txn.be) -m str linear }
    http-request set-path %[path,regsub(^/canary,/)]    if { var(txn.be) -m str canary }
    http-request set-path %[path,regsub(^/bluegreen,/)] if { var(txn.be) -m str bluegreen }

    use_backend linear_app_be     if { var(txn.be) -m str linear }
    use_backend canary_app_be     if { var(txn.be) -m str canary }
    use_backend blue_green_app_be if { var(txn.be) -m str bluegreen }

