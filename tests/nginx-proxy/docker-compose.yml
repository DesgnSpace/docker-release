services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-tmpl:/shared/nginx-tmpl:rw
    command: ["watch"]

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-tmpl:/app/nginx.tmpl:ro
    depends_on:
      docker-release:
        condition: service_started

  linear_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "linear"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
      - "release.upstream=linear.local"
    environment:
      - VIRTUAL_HOST=linear.local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3

  canary_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "canary"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.canary.affinity=cookie"
      - "release.health_check_timeout=20s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
      - "release.upstream=canary.local"
    environment:
      - VIRTUAL_HOST=canary.local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3

  blue_green_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "blue_green"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.health_check_timeout=20s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
      - "release.upstream=bluegreen.local"
    environment:
      - VIRTUAL_HOST=bluegreen.local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  nginx-tmpl:
