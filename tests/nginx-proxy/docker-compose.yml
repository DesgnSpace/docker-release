services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-tmpl:/shared/nginx-tmpl:rw
    command: ["watch"]

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-tmpl:/app/custom:ro
    environment:
      - NGINX_TMPL=/app/custom/nginx.tmpl
      - DEFAULT_HOST=localhost
      - HTTP_PORT=8080
    depends_on:
      docker-release:
        condition: service_started

  linear_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "linear"
    deploy:
      replicas: 2
    depends_on:
      docker-release:
        condition: service_started
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
    environment:
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/linear/
      - VIRTUAL_DEST=/

  canary_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "canary"
    deploy:
      replicas: 2
    depends_on:
      docker-release:
        condition: service_started
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.affinity=cookie"
      - "release.health_check_timeout=20s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
    environment:
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/canary/
      - VIRTUAL_DEST=/

  blue_green_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "blue_green"
    deploy:
      replicas: 2
    depends_on:
      docker-release:
        condition: service_started
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.bg.green_weight=50"
      - "release.affinity=ip"
      - "release.health_check_timeout=20s"
      - "release.nginx.config_dir=/shared/nginx-tmpl"
    environment:
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/bluegreen/
      - VIRTUAL_DEST=/

volumes:
  nginx-tmpl:
