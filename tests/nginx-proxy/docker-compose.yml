services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-tmpl:/shared/nginx-tmpl:rw
    command: ["watch"]
    environment:
      - DR_EXPOSE_API=true
      - DR_EXPOSE_WEB=true
    ports:
      - "9080:9080"
      - "9081:9081"

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-tmpl:/app/custom:ro
    environment:
      - NGINX_TMPL=/app/custom/nginx.tmpl
      - DEFAULT_HOST=localhost
      - HTTP_PORT=8080
    depends_on:
      docker-release:
        condition: service_healthy

  linear_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=linear
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/linear/
      - VIRTUAL_DEST=/
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"

  canary_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=canary
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/canary/
      - VIRTUAL_DEST=/
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.affinity=cookie"
      - "release.health_check_timeout=20s"

  blue_green_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=blue_green
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PATH=/bluegreen/
      - VIRTUAL_DEST=/
    labels:
      - "release.enable=true"
      - "release.provider=nginx-proxy"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.bg.green_weight=50"
      - "release.health_check_timeout=20s"

volumes:
  nginx-tmpl:
