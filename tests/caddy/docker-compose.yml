services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy-config:/shared/caddy-config:rw
    command: ["watch"]
    depends_on:
      linear_app:
        condition: service_started
      canary_app:
        condition: service_started
      blue_green_app:
        condition: service_started

  caddy:
    image: caddy:alpine
    ports:
      - "8087:80"
    volumes:
      - caddy-config:/etc/caddy/conf.d:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      docker-release:
        condition: service_started

  linear_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "linear"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"
      - "release.caddy.service=caddy"
      - "release.caddy.config_dir=/shared/caddy-config"
      - "release.caddy.path=/linear"

  canary_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "canary"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.affinity=cookie"
      - "release.health_check_timeout=20s"
      - "release.caddy.service=caddy"
      - "release.caddy.config_dir=/shared/caddy-config"
      - "release.caddy.path=/canary"

  blue_green_app:
    build:
      context: ..
      dockerfile: app.Dockerfile
      args:
        BUILD_ID: "blue_green"
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.bg.green_weight=50"
      - "release.affinity=ip"
      - "release.health_check_timeout=20s"
      - "release.caddy.service=caddy"
      - "release.caddy.config_dir=/shared/caddy-config"
      - "release.caddy.path=/bluegreen"

volumes:
  caddy-config:
