services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy-config:/shared/caddy-config:rw
    command: ["watch"]
    environment:
      - DR_EXPOSE_API=true
      - DR_EXPOSE_WEB=true
    ports:
      - "9080:9080"
      - "9081:9081"

  caddy:
    image: caddy:alpine
    ports:
      - "8087:80"
    volumes:
      - caddy-config:/etc/caddy/conf.d:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      docker-release:
        condition: service_healthy

  linear_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=linear
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=linear"
      - "release.health_check_timeout=20s"
      - "release.drain_timeout=5s"

  canary_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=canary
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.affinity=cookie"
      - "release.health_check_timeout=20s"

  blue_green_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=blue_green
    labels:
      - "release.enable=true"
      - "release.provider=caddy"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.bg.green_weight=50"
      - "release.health_check_timeout=20s"

volumes:
  caddy-config:
