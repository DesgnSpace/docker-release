services:
  docker-release:
    build:
      context: ../../
      dockerfile: Dockerfile
    command: ["watch"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-dynamic:/shared/traefik-config:rw
      - docker-release-state:/var/lib/docker-release:rw

  traefik:
    image: traefik:v3.4
    command:
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    ports:
      - "8082:80"
      - "8083:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-dynamic:/etc/traefik/dynamic:ro

  linear_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=linear
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=traefik"
      - "release.strategy=linear"
      - "release.drain_timeout=5s"
      - "release.health_check_timeout=30s"
      - "release.traefik.config_dir=/shared/traefik-config"
      - "traefik.enable=true"
      - "traefik.http.routers.linear-app.rule=PathPrefix(`/linear`)"
      - "traefik.http.routers.linear-app.service=linear_app@file"
      - "traefik.http.routers.linear-app.middlewares=strip-linear"
      - "traefik.http.middlewares.strip-linear.stripprefix.prefixes=/linear"

  canary_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=canary
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=traefik"
      - "release.strategy=canary"
      - "release.canary.start_percentage=25"
      - "release.canary.step=25"
      - "release.canary.interval=10s"
      - "release.affinity=cookie"
      - "release.drain_timeout=5s"
      - "release.health_check_timeout=30s"
      - "release.traefik.config_dir=/shared/traefik-config"
      - "traefik.enable=true"
      - "traefik.http.routers.canary-app.rule=PathPrefix(`/canary`)"
      - "traefik.http.routers.canary-app.service=canary_app@file"
      - "traefik.http.routers.canary-app.middlewares=strip-canary"
      - "traefik.http.middlewares.strip-canary.stripprefix.prefixes=/canary"

  blue_green_app:
    image: traefik/whoami
    environment:
      - WHOAMI_NAME=blue_green
    deploy:
      replicas: 2
    labels:
      - "release.enable=true"
      - "release.provider=traefik"
      - "release.strategy=blue-green"
      - "release.bg.soak_time=30s"
      - "release.bg.green_weight=50"
      - "release.affinity=ip"
      - "release.drain_timeout=5s"
      - "release.health_check_timeout=30s"
      - "release.traefik.config_dir=/shared/traefik-config"
      - "traefik.enable=true"
      - "traefik.http.routers.blue-green-app.rule=PathPrefix(`/bluegreen`)"
      - "traefik.http.routers.blue-green-app.service=blue_green_app@file"
      - "traefik.http.routers.blue-green-app.middlewares=strip-blue-green"
      - "traefik.http.middlewares.strip-blue-green.stripprefix.prefixes=/bluegreen"

volumes:
  docker-release-state:
  traefik-dynamic:
